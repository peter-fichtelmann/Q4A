<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadball - Room Lobby</title>
    <link rel="stylesheet" href="/client/styles.css">
</head>
<body>
    <div class="container room-container">
        <h1>Room Lobby</h1>
        <h3 class="subtitle">Configure teams and roles before starting</h3>

        <div class="room-status">
            <h3>Room ID</h3>
            <p>
                <strong id="roomId"></strong>
                <button onclick="copyRoomId()" class="btn btn-small">Copy Room ID</button>
            </p>
            <p class="hint">Share this Room ID with players from the main lobby page.</p>
        </div>

        <p class="room-hint">Drag and drop your player box to team and position of your dreams</p>

        <div class="room-board">
            <section class="board-column">
                <h2>Team A</h2>
                <div id="teamASlots" class="slot-grid"></div>
            </section>

            <section class="board-column center-column">
                <h2>Spectators</h2>
                <div id="spectatorDropzone" class="spectator-dropzone"></div>
            </section>

            <section class="board-column">
                <h2>Team B</h2>
                <div id="teamBSlots" class="slot-grid"></div>
            </section>
        </div>

        <div class="actions">
            <button id="startBtn" onclick="startGame()" class="btn btn-primary hidden">Start Game</button>
            <button onclick="goBackToLobby()" class="btn btn-secondary">Back To Main Lobby</button>
        </div>

        <div id="status" class="status"></div>
    </div>

    <script src="/client/client_palette.js"></script>
    <script src="/client/room_client.js"></script>
</body>
</html>
